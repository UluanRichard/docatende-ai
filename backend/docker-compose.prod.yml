services:
  backend:
    build: ./backend
    container_name: docatende_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  frontend:
    build: ./frontend
    container_name: docatende_frontend
    restart: always
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    container_name: docatende_postgres
    restart: always
    environment:
      POSTGRES_DB: docatende
      POSTGRES_USER: docatende
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - docatende_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: docatende_redis
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: docatende_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: docatende
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"

  worker:
    build: ./backend
    container_name: docatende_worker
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - rabbitmq
      - redis
      - postgres

volumes:
  docatende_postgres_data:
services:
  backend:
    build: ./backend
    container_name: docatende_backend
    restart: always
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  frontend:
    build: ./frontend
    container_name: docatende_frontend
    restart: always
    env_file:
      - ./frontend/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    container_name: docatende_postgres
    restart: always
    environment:
      POSTGRES_DB: docatende
      POSTGRES_USER: docatende
      POSTGRES_PASSWORD: docatende_password
    volumes:
      - docatende_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: docatende_redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: docatende_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  worker:
    build: ./backend
    container_name: docatende_worker
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env.example
    depends_on:
      - backend
      - rabbitmq
      - redis
      - postgres

volumes:
  docatende_postgres_data:
